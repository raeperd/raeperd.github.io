on:
  push:
  schedule:
    - cron: '15 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          node-version: lts/gallium
          cache: npm
      - uses: actions/cache@v2
        with:
          path: ~/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.OS }}-
      - run: mkdir ./lib/content
      - name: Download articles
        uses: raeperd/google-drive-download-action@v1
        with:
          clientSecret: ${{ secrets.CLIENT_SECRET }}
          clientId: ${{ secrets.CLIENT_ID }}
          redirectUri: ${{ secrets.REDIRECT_URI }}
          credential_json: ${{ secrets.CREDENTIAL_JSON }}
          q: "'1pVVyuei5f4sCg5WuCLzuXNj7CZsmDKyX' in parents and (name = 'articles' or name = 'references' or name = 'algorithms')"
          path: "./lib/content"
      - name: build and test
        uses: cypress-io/github-action@v2
        with:
          build: npm run build
          start: npm run start
      - run: npm run test
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - run: npm run export
      - uses: actions/upload-artifact@v3
        with:
          name: static-pages
          path: out/

  deploy-github-page:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: static-pages
          path: ./static-pages
      - run: touch .nojekyll
      - uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN  }}
          publish_dir: ./static-pages
          force_orphan: true

  deploy-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v3
      - run: mkdir out
      - uses: actions/download-artifact@v3
        with:
          name: static-pages
          path: ./out
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v1
      - uses: docker/setup-buildx-action@v1
      - uses: docker/metadata-action@v4
        id: metadata
        with:
          images: |
            raeperd/blog
            ghcr.io/raeperd/blog
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
      - uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64,linux/arm/v7, linux/arm64/v8
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
